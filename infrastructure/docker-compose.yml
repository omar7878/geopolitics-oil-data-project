services:
  # ==========================================
  # 0. BASE DE DONNÉES POUR AIRFLOW (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ==========================================
  # 1. LE STOCKAGE DISTRIBUÉ (Le Faux Amazon S3)
  # ==========================================
  localstack:
    image: localstack/localstack:latest
    container_name: datalake_s3
    ports:
      - "4566:4566"            # Le port magique pour parler à S3
    environment:
      - SERVICES=s3            # On n'allume que S3 pour économiser la RAM du PC
      - DEBUG=1
      - AWS_DEFAULT_REGION=eu-west-1
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume_s3}:/var/lib/localstack"
      - ./localstack_init.sh:/etc/localstack/init/ready.d/init.sh  # Exécuté auto au démarrage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      retries: 5

  # ==========================================
  # 2. LE TEMPS RÉEL (Kafka & Zookeeper)
  # ⏸️  PHASE 2 — Commenté pour l'instant, sera activé pour le bonus streaming
  # ==========================================
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.4.0
  #   container_name: zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   healthcheck:
  #     test: ["CMD", "nc", "-z", "localhost", "2181"]
  #     interval: 10s
  #     retries: 5
  #
  # kafka:
  #   image: confluentinc/cp-kafka:7.4.0
  #   container_name: kafka_broker
  #   depends_on:
  #     zookeeper:
  #       condition: service_healthy
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #   healthcheck:
  #     test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
  #     interval: 15s
  #     retries: 5

  # ==========================================
  # 3. L'INDEXATION & LE DASHBOARD (Elastic + Kibana)
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # On limite la RAM prise par Elastic
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"            # L'adresse de ton tableau de bord (http://localhost:5601)

  # ==========================================
  # 4. L'ORCHESTRATION (Apache Airflow)
  # ==========================================
  airflow:
    image: apache/airflow:2.7.2
    container_name: airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      # kafka:                      # ⏸️ PHASE 2 — à réactiver avec Kafka
      #   condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      # Variables AWS pour LocalStack
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
    ports:
      - "8080:8080"            # L'interface web d'Airflow (http://localhost:8080)
    command: bash -c "pip install --quiet awscli awscli-local && airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver & airflow scheduler"

volumes:
  postgres_data: