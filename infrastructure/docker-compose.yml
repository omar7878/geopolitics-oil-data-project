services:
  # ==========================================
  # 0. BASE DE DONNÉES POUR AIRFLOW (PostgreSQL)
  # ==========================================
  postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ==========================================
  # 1. LE STOCKAGE DISTRIBUÉ (Le Faux Amazon S3)
  # ==========================================
  localstack:
    image: localstack/localstack:3.8   # v3.x = persistance S3 stable en Community
    container_name: datalake_s3
    ports:
      - "4566:4566"            # Le port magique pour parler à S3
    environment:
      - SERVICES=s3            # On n'allume que S3 pour économiser la RAM du PC
      - DEBUG=1
      - AWS_DEFAULT_REGION=eu-west-1
    volumes:
      - ./localstack_init.sh:/etc/localstack/init/ready.d/init.sh  # Exécuté auto au démarrage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      retries: 5

  # ==========================================
  # 2. L'INDEXATION & LE DASHBOARD (Elastic + Kibana)
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # On limite la RAM prise par Elastic
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data  # Persistance des index Elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"            # Adresse du tableau de bord (http://localhost:5601)

  # ==========================================
  # 4. L'ORCHESTRATION (Apache Airflow)
  # ==========================================
  airflow:
    build:
      context: ..                       # Racine du projet (pour COPY dags/ et src/)
      dockerfile: infrastructure/airflow.Dockerfile
    container_name: airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      # Variables AWS pour LocalStack
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=eu-west-1
      - AWS_ENDPOINT_URL=http://localstack:4566
      # Elasticsearch & Kibana (noms Docker internes)
      - ES_HOST=http://elasticsearch:9200
      - KIBANA_URL=http://kibana:5601
    ports:
      - "8080:8080"            # L'interface web d'Airflow (http://localhost:8080)
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        airflow db init
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        airflow webserver &
        airflow scheduler

volumes:
  postgres_data:
  elastic_data: